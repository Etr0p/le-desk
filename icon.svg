<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Le Desk — icône : courbe de taux stylisée sur fond terminal -->
  <rect width="512" height="512" rx="96" fill="#0c1118"/>
  <rect x="40" y="40" width="432" height="432" rx="72" fill="#121925"/>
  <!-- grille discrète -->
  <g stroke="#233040" stroke-width="4">
    <line x1="96" y1="160" x2="416" y2="160"/>
    <line x1="96" y1="256" x2="416" y2="256"/>
    <line x1="96" y1="352" x2="416" y2="352"/>
  </g>
  <!-- courbe des taux -->
  <path d="M 104 376 C 200 372, 248 320, 296 248 C 330 196, 372 160, 408 144"
        fill="none" stroke="#2fbf71" stroke-width="28" stroke-linecap="round"/>
  <!-- point terminal -->
  <circle cx="408" cy="144" r="22" fill="#2fbf71"/>
</svg>
